<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineHub Preview – Discover, Experience & Book Entertainment</title>
  <!-- Tailwind CSS for rapid layout styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React and ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel CDN to compile JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Google Fonts Outfit & Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.244.0"></script>
  
  <style>
    body {
      background-color: #0F172A;
      color: #FFFFFF;
      font-family: 'Outfit', 'Inter', sans-serif;
    }
    .text-gradient {
      background: linear-gradient(135deg, #A78BFA 0%, #F472B6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .glass-panel {
      background: rgba(30, 41, 59, 0.45);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.55);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      transform: translateY(-6px);
      border-color: rgba(124, 58, 237, 0.5);
      box-shadow: 0 12px 30px rgba(124, 58, 237, 0.25);
    }
    /* Hide scrollbar */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0F172A',
            purple: '#7C3AED',
            pink: '#EC4899',
            slatecard: '#1E293B',
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- MOCK DATABASE ---
    const INITIAL_MOVIES = [
      {
        id: "m1",
        title: "Interstellar",
        poster: "https://images.unsplash.com/photo-1506703719100-a0f3a48c0f86?w=600&auto=format&fit=crop&q=80",
        language: "English",
        duration: 169,
        genre: "Sci-Fi, Adventure, Drama",
        rating: 9.2,
        votes: 14200,
        synopsis: "A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival. Faced with resource depletion on Earth, astronauts venture into the unknown deep space.",
        mood: "Excited",
        price: 15.0,
        theatre: "PVR Infiniti Mall, Mumbai",
        time: "06:00 PM"
      },
      {
        id: "m2",
        title: "La La Land",
        poster: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600&auto=format&fit=crop&q=80",
        language: "English",
        duration: 128,
        genre: "Romance, Musical, Drama",
        rating: 8.6,
        votes: 9500,
        synopsis: "While navigating their careers in Los Angeles, a pianist and an actress fall in love while attempting to reconcile their aspirations for the future.",
        mood: "Romantic",
        price: 12.5,
        theatre: "Cinepolis Forum Mall, Bengaluru",
        time: "08:30 PM"
      },
      {
        id: "m3",
        title: "The Conjuring",
        poster: "https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=600&auto=format&fit=crop&q=80",
        language: "English",
        duration: 112,
        genre: "Horror, Mystery, Thriller",
        rating: 7.8,
        votes: 8100,
        synopsis: "Paranormal investigators Ed and Lorraine Warren work to help a family terrorized by a dark presence in their farmhouse.",
        mood: "Scared",
        price: 11.0,
        theatre: "IMAX Palladium, Mumbai",
        time: "10:00 PM"
      },
      {
        id: "m4",
        title: "The Hangover",
        poster: "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=600&auto=format&fit=crop&q=80",
        language: "English",
        duration: 100,
        genre: "Comedy",
        rating: 8.0,
        votes: 11000,
        synopsis: "Three buddies wake up from a bachelor party in Las Vegas, with no memory of the previous night and the bachelor missing.",
        mood: "Happy",
        price: 10.0,
        theatre: "PVR Plaza Connaught Place, New Delhi",
        time: "02:00 PM"
      }
    ];

    const INITIAL_EVENTS = [
      {
        id: "e1",
        title: "Coldplay BKC Music Festival",
        category: "Music Shows",
        banner: "https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=600&auto=format&fit=crop&q=80",
        description: "Experience Coldplay live in India performing their greatest hits. A night full of lights, colours, and cosmic music.",
        venue: "Jio World Garden BKC, Mumbai",
        date: "2026-06-25",
        price: 150.0
      },
      {
        id: "e2",
        title: "Zakir Khan Standup Live",
        category: "Comedy Shows",
        banner: "https://images.unsplash.com/photo-1585699324551-f6c309eed262?w=600&auto=format&fit=crop&q=80",
        description: "The 'Sakht Launda' is back with fresh jokes. Get ready for a highly relatable comedy session.",
        venue: "The Comedy Store, Bengaluru",
        date: "2026-06-15",
        price: 35.0
      }
    ];

    const INITIAL_SPORTS = [
      {
        id: "s1",
        title: "IPL: Mumbai Indians vs Chennai Super Kings",
        banner: "https://images.unsplash.com/photo-1540747737956-378723c03095?w=600&auto=format&fit=crop&q=80",
        description: "The ultimate cricket rivalry resumes at Wankhede Stadium. Watch the titans clash live.",
        venue: "Wankhede Stadium, Mumbai",
        date: "2026-06-28",
        price: 45.0
      }
    ];

    function CineHubApp() {
      // SPA routing state
      const [page, setPage] = useState('dashboard'); // dashboard, movie, booking, groupbooking, profile, admin, login
      const [selectedItemId, setSelectedItemId] = useState('m1');
      const [selectedItemType, setSelectedItemType] = useState('movie'); // movie, event, sports
      
      // Global States
      const [user, setUser] = useState({
        fullName: "John Doe",
        email: "user@cinehub.com",
        rewards: 100
      });
      const [isLoggedIn, setIsLoggedIn] = useState(true);
      const [selectedCity, setSelectedCity] = useState("Mumbai");
      const [searchQuery, setSearchQuery] = useState("");
      const [searchCategory, setSearchCategory] = useState("Movies");

      // Seat layout booking page state
      const [seatGrid, setSeatGrid] = useState({});
      const [selectedSeats, setSelectedSeats] = useState([]);
      const [isReserveOnly, setIsReserveOnly] = useState(false);

      // Group booking details state
      const [groupBookings, setGroupBookings] = useState({
        "GB101": {
          id: "GB101",
          showTitle: "Interstellar",
          showPlace: "PVR Infiniti Mall, Mumbai",
          time: "06:00 PM",
          price: 15.0,
          members: [
            { name: "Alice (Organizer)", seats: ["A1"] },
            { name: "Bob (Joined Friend)", seats: ["A2"] }
          ]
        }
      });
      const [activeGroupCode, setActiveGroupCode] = useState("GB101");
      const [friendName, setFriendName] = useState("");

      // Orders, GiftCards list
      const [orders, setOrders] = useState([
        {
          id: "B8F79",
          title: "Interstellar",
          place: "PVR Infiniti Mall, Mumbai",
          seats: "A5, A6",
          price: 30.0,
          status: "Confirmed",
          date: "June 10, 2026 - 06:00 PM",
          qr: "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=CineHub-B8F79"
        }
      ]);
      const [giftCards, setGiftCards] = useState([
        { code: "CINE100", value: 100.0, redeemed: false }
      ]);
      const [rewardHistory, setRewardHistory] = useState([
        { desc: "Welcome Bonus Points", points: 100, date: "June 08, 2026" }
      ]);

      // Sentiment reviews state
      const [reviews, setReviews] = useState({
        "m1": [
          { name: "Alice Test", rating: 10, comment: "Absolutely mind-bending! Christopher Nolan is a genius. The music by Hans Zimmer is amazing.", sentiment: "Positive" }
        ]
      });
      const [reviewRating, setReviewRating] = useState(10);
      const [reviewComment, setReviewComment] = useState("");

      // Filters
      const [selectedMood, setSelectedMood] = useState("");
      const [budgetLimit, setBudgetLimit] = useState(200);

      // Hero index
      const [heroIndex, setHeroIndex] = useState(0);

      // Auto rotation for hero banner
      useEffect(() => {
        const interval = setInterval(() => {
          setHeroIndex((prev) => (prev + 1) % INITIAL_MOVIES.length);
        }, 8000);
        return () => clearInterval(interval);
      }, []);

      const activeHero = INITIAL_MOVIES[heroIndex];

      // Reset layout when entering booking page
      const loadBookingLayout = (itemId, type) => {
        setSelectedItemId(itemId);
        setSelectedItemType(type);
        setSelectedSeats([]);
        setPage('booking');
      };

      const handleSeatClick = (row, col) => {
        const code = `${row}${col}`;
        // check if already booked in mock grid
        if (code === "A1" || code === "A2" || code === "C3" || code === "D4") return; 

        if (selectedSeats.includes(code)) {
          setSelectedSeats(selectedSeats.filter(s => s !== code));
        } else {
          setSelectedSeats([...selectedSeats, code]);
        }
      };

      const processBooking = (reserveMode = false) => {
        if (!isLoggedIn) {
          setPage('login');
          return;
        }
        if (selectedSeats.length === 0) {
          alert("Please select at least one seat first!");
          return;
        }

        const target = selectedItemType === 'movie' 
          ? INITIAL_MOVIES.find(m => m.id === selectedItemId)
          : (selectedItemType === 'event' ? INITIAL_EVENTS.find(e => e.id === selectedItemId) : INITIAL_SPORTS.find(s => s.id === selectedItemId));

        const totalPrice = target.price * selectedSeats.length;

        if (reserveMode) {
          // Reserve (Book Later)
          const newOrder = {
            id: Math.random().toString(36).substring(2, 7).toUpperCase(),
            title: target.title,
            place: target.theatre || target.venue,
            seats: selectedSeats.join(", "),
            price: totalPrice,
            status: "Reserved",
            date: `June 12, 2026 - ${target.time || "07:00 PM"}`,
            qr: ""
          };
          setOrders([newOrder, ...orders]);
          alert("Reservation created! Your seats are held. Please confirm and pay within 1 day before showtime.");
          setPage('profile');
        } else {
          // Pay instantly
          const newId = Math.random().toString(36).substring(2, 7).toUpperCase();
          const newOrder = {
            id: newId,
            title: target.title,
            place: target.theatre || target.venue,
            seats: selectedSeats.join(", "),
            price: totalPrice,
            status: "Confirmed",
            date: `June 12, 2026 - ${target.time || "07:00 PM"}`,
            qr: `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=CineHub-${newId}`
          };
          setOrders([newOrder, ...orders]);
          
          // Earning 15 Reward Points
          setUser({ ...user, rewards: user.rewards + 15 });
          setRewardHistory([{ desc: `Earned from booking ${newId}`, points: 15, date: "June 08, 2026" }, ...rewardHistory]);

          alert(`Booking Successful! You earned 15 reward points. Check your ticket QR code in your Profile.`);
          setPage('profile');
        }
      };

      const startGroupBooking = () => {
        if (!isLoggedIn) {
          setPage('login');
          return;
        }
        if (selectedSeats.length === 0) {
          alert("Select starting seats first!");
          return;
        }

        const target = INITIAL_MOVIES.find(m => m.id === selectedItemId) || INITIAL_MOVIES[0];
        const newCode = "GB" + Math.floor(100 + Math.random() * 900);
        
        setGroupBookings({
          ...groupBookings,
          [newCode]: {
            id: newCode,
            showTitle: target.title,
            showPlace: target.theatre || target.venue,
            time: target.time || "06:00 PM",
            price: target.price,
            members: [
              { name: `${user.fullName} (Organizer)`, seats: selectedSeats }
            ]
          }
        });
        setActiveGroupCode(newCode);
        setPage('groupbooking');
      };

      const joinGroupBooking = (e) => {
        e.preventDefault();
        if (!friendName.trim()) {
          alert("Please enter your name!");
          return;
        }
        if (!selectedSeats.length) {
          alert("Please select a seat!");
          return;
        }

        const currentGroup = groupBookings[activeGroupCode];
        const updatedMembers = [
          ...currentGroup.members,
          { name: friendName, seats: selectedSeats }
        ];

        setGroupBookings({
          ...groupBookings,
          [activeGroupCode]: {
            ...currentGroup,
            members: updatedMembers
          }
        });
        alert(`${friendName} joined the group booking!`);
        setFriendName("");
        setSelectedSeats([]);
      };

      const payGroupBooking = () => {
        const currentGroup = groupBookings[activeGroupCode];
        const totalSeatCount = currentGroup.members.reduce((acc, m) => acc + m.seats.length, 0);
        const totalPrice = currentGroup.price * totalSeatCount;

        const newId = Math.random().toString(36).substring(2, 7).toUpperCase();
        const newOrder = {
          id: newId,
          title: currentGroup.showTitle,
          place: currentGroup.showPlace,
          seats: currentGroup.members.reduce((acc, m) => acc.concat(m.seats), []).join(", "),
          price: totalPrice,
          status: "Confirmed",
          date: `June 12, 2026 - ${currentGroup.time}`,
          qr: `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=CineHub-${newId}`
        };

        setOrders([newOrder, ...orders]);
        setUser({ ...user, rewards: user.rewards + 30 });
        setRewardHistory([{ desc: `Group Host Bonus: ${currentGroup.id}`, points: 30, date: "June 08, 2026" }, ...rewardHistory]);

        alert(`Group Booking Confirmed! Single unified payment of $${totalPrice} complete. Check tickets in your Profile.`);
        setPage('profile');
      };

      const handleAddReview = (e) => {
        e.preventDefault();
        if (!reviewComment.trim()) return;

        // Simple sentiment check
        const commentLower = reviewComment.toLowerCase();
        const posWords = ['good', 'love', 'amazing', 'great', 'excellent', 'nice', 'awesome', 'best', 'superb', 'enjoyed'];
        const negWords = ['bad', 'waste', 'worst', 'boring', 'poor', 'hate', 'terrible', 'slow'];
        
        let posCount = 0, negCount = 0;
        posWords.forEach(w => { if(commentLower.includes(w)) posCount++ });
        negWords.forEach(w => { if(commentLower.includes(w)) negCount++ });

        const sentiment = posCount > negCount ? "Positive" : (negCount > posCount ? "Negative" : "Neutral");

        const newRev = {
          name: user.fullName,
          rating: reviewRating,
          comment: reviewComment,
          sentiment: sentiment
        };

        const existing = reviews[selectedItemId] || [];
        setReviews({
          ...reviews,
          [selectedItemId]: [newRev, ...existing]
        });
        setReviewComment("");
        alert(`Review submitted! Calculated sentiment: ${sentiment}`);
      };

      return (
        <div className="flex flex-col min-h-screen">
          {/* HEADER */}
          <header className="sticky top-0 z-50 bg-navy/90 backdrop-blur-md border-b border-white/10 px-6 py-4">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
              
              {/* Logo */}
              <div className="flex items-center gap-2 cursor-pointer" onClick={() => setPage('dashboard')}>
                <span className="text-3xl">🍿</span>
                <span className="text-gradient text-2xl font-extrabold tracking-wider">CineHub</span>
              </div>

              {/* Global search */}
              <div className="flex items-center bg-slatecard/60 rounded-xl px-3 py-2 border border-white/10 flex-1 max-w-lg w-full">
                <i data-lucide="search" className="text-gray-400 mr-2 w-4 h-4"></i>
                <input 
                  type="text" 
                  placeholder={`Search ${searchCategory}...`} 
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="bg-transparent text-white border-none outline-none w-full text-sm"
                />
              </div>

              {/* Right Controls */}
              <div className="flex items-center gap-6">
                
                {/* Location select */}
                <div className="flex items-center gap-1">
                  <i data-lucide="map-pin" className="text-pink w-4 h-4"></i>
                  <select 
                    value={selectedCity} 
                    onChange={(e) => setSelectedCity(e.target.value)}
                    className="bg-transparent text-white text-sm font-semibold border-none outline-none cursor-pointer"
                  >
                    <option value="Mumbai" className="bg-navy text-white">Mumbai</option>
                    <option value="Bengaluru" className="bg-navy text-white">Bengaluru</option>
                    <option value="New Delhi" className="bg-navy text-white">New Delhi</option>
                    <option value="Kolkata" className="bg-navy text-white">Kolkata</option>
                  </select>
                </div>

                {/* Profile panel / signin */}
                {isLoggedIn ? (
                  <div className="flex items-center gap-3">
                    <div 
                      onClick={() => setPage('profile')}
                      className="w-10 h-10 rounded-full bg-purple flex items-center justify-center font-bold text-white cursor-pointer shadow-lg shadow-purple/35"
                    >
                      JD
                    </div>
                    <button 
                      onClick={() => setPage('admin')}
                      className="text-xs font-semibold bg-white/5 border border-white/10 text-pink px-3 py-2 rounded-lg hover:bg-white/10"
                    >
                      Admin Panel
                    </button>
                    <button 
                      onClick={() => setIsLoggedIn(false)}
                      className="text-xs font-semibold bg-red-600/20 text-red-500 px-3 py-2 rounded-lg hover:bg-red-600/30"
                    >
                      Logout
                    </button>
                  </div>
                ) : (
                  <button 
                    onClick={() => { setIsLoggedIn(true); setPage('dashboard'); }} 
                    className="bg-gradient-to-r from-purple to-pink px-5 py-2 rounded-xl text-sm font-bold shadow-lg shadow-purple/40"
                  >
                    Sign In
                  </button>
                )}

              </div>
            </div>

            {/* Categories Navigation */}
            <div className="max-w-7xl mx-auto flex gap-6 overflow-x-auto py-2 mt-4 border-t border-white/5 no-scrollbar">
              {['Movies', 'Stream', 'Events', 'Plays', 'Sports', 'Activities', 'Venues', 'Offers', 'Others'].map((cat) => (
                <span
                  key={cat}
                  onClick={() => { setSearchCategory(cat); setPage('dashboard'); }}
                  className={`text-sm font-medium cursor-pointer pb-1 whitespace-nowrap transition-all ${
                    searchCategory === cat ? 'text-pink border-b-2 border-pink font-bold' : 'text-gray-400 hover:text-white'
                  }`}
                >
                  {cat}
                </span>
              ))}
            </div>
          </header>

          {/* MAIN PAGE */}
          <main className="flex-1 max-w-7xl w-full mx-auto px-6 py-8">
            
            {/* PAGE: DASHBOARD */}
            {page === 'dashboard' && (
              <div>
                
                {/* Hero Carousel */}
                <div 
                  className="relative h-[380px] rounded-2xl overflow-hidden mb-8 bg-cover bg-center transition-all duration-1000 shadow-xl border border-white/5"
                  style={{ backgroundImage: `url(${activeHero.poster})` }}
                >
                  <div className="absolute inset-0 bg-gradient-to-t from-navy via-navy/55 to-transparent"></div>
                  <div className="absolute bottom-8 left-8 max-w-xl">
                    <span className="bg-purple/40 text-purple-300 border border-purple px-3 py-1 rounded-full text-xs font-bold tracking-wider mb-3 inline-block">
                      TRENDING NOW
                    </span>
                    <h1 className="text-4xl font-extrabold mb-2 text-white">{activeHero.title}</h1>
                    <p className="text-gray-300 text-sm mb-4 line-clamp-2">{activeHero.synopsis}</p>
                    <button 
                      onClick={() => loadBookingLayout(activeHero.id, 'movie')}
                      className="bg-gradient-to-r from-purple to-pink px-6 py-3 rounded-xl font-extrabold text-sm shadow-lg shadow-purple/35"
                    >
                      Book Tickets
                    </button>
                  </div>
                </div>

                {/* Mood buttons (Only for Movies) */}
                {searchCategory === 'Movies' && (
                  <div className="mb-8">
                    <h2 className="text-lg font-bold mb-3 flex items-center gap-2">
                      <span>🎭</span> Filter by your Mood:
                    </h2>
                    <div className="flex gap-3 flex-wrap">
                      {[
                        { mood: "Happy", emoji: "😊", bg: "bg-emerald-600" },
                        { mood: "Excited", emoji: "🤩", bg: "bg-purple" },
                        { mood: "Romantic", emoji: "💖", bg: "bg-pink" },
                        { mood: "Scared", emoji: "😱", bg: "bg-red-600" }
                      ].map((m) => (
                        <button
                          key={m.mood}
                          onClick={() => setSelectedMood(selectedMood === m.mood ? "" : m.mood)}
                          className={`px-4 py-2 rounded-full text-xs font-bold transition-all border ${
                            selectedMood === m.mood ? `${m.bg} border-transparent text-white` : 'bg-slatecard/50 border-white/10 hover:bg-slatecard'
                          }`}
                        >
                          <span className="mr-1">{m.emoji}</span> {m.mood}
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {/* Smart Budget Filter slider */}
                <div className="glass-panel p-4 mb-8 max-w-sm flex flex-col gap-2">
                  <div className="flex justify-between items-center text-xs font-semibold">
                    <span className="text-gray-400">Smart Budget Filter</span>
                    <span className="text-pink font-bold">Max: ${budgetLimit}</span>
                  </div>
                  <input 
                    type="range" 
                    min="10" 
                    max="200" 
                    value={budgetLimit}
                    onChange={(e) => setBudgetLimit(Number(e.target.value))}
                    className="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-pink"
                  />
                  <div className="flex justify-between text-[10px] text-gray-500">
                    <span>$10</span>
                    <span>$200</span>
                  </div>
                </div>

                {/* Grid Lists */}
                <div>
                  <h3 className="text-2xl font-black mb-6">Explore {searchCategory} in <span className="text-pink">{selectedCity}</span></h3>
                  
                  {/* Movies Render */}
                  {searchCategory === 'Movies' && (
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                      {INITIAL_MOVIES
                        .filter(m => !selectedMood || m.mood === selectedMood)
                        .filter(m => m.price <= budgetLimit)
                        .filter(m => !searchQuery || m.title.toLowerCase().includes(searchQuery.toLowerCase()))
                        .map((movie) => (
                          <div 
                            key={movie.id} 
                            onClick={() => { setSelectedItemId(movie.id); setSelectedItemType('movie'); setPage('movie'); }}
                            className="glass-card rounded-2xl overflow-hidden cursor-pointer"
                          >
                            <img src={movie.poster} alt={movie.title} className="h-64 w-full object-cover" />
                            <div className="p-4">
                              <div className="flex items-center gap-1 text-yellow-500 text-xs mb-1">

                    ].map((d) => (
                      <div key={d.day} className="flex-1 flex flex-col items-center gap-2 group cursor-pointer">
                        <span className="text-[10px] text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity font-bold">${d.val}</span>
                        <div className={`w-full bg-gradient-to-t from-purple to-pink rounded-t ${d.ht} group-hover:brightness-125 transition-all`}></div>
                        <span className="text-[10px] text-gray-400 font-semibold">{d.day}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Catalog items */}
                <div className="glass-panel p-4">
                  <h4 className="text-base font-bold mb-3">Inventory catalogs list</h4>
                  <table className="w-full text-xs text-left">
                    <thead>
                      <tr className="border-b border-white/10 text-gray-400">
                        <th className="py-2">Title</th>
                        <th className="py-2">Language</th>
                        <th className="py-2">Mood tag</th>
                        <th className="py-2 text-right">Base Ticket Price</th>
                      </tr>
                    </thead>
                    <tbody>
                      {INITIAL_MOVIES.map(m => (
                        <tr key={m.id} className="border-b border-white/5 font-semibold">
                          <td className="py-2.5">{m.title}</td>
                          <td className="py-2.5 text-gray-400">{m.language}</td>
                          <td className="py-2.5"><span className="bg-purple/20 text-purple-300 px-2 py-0.5 rounded-full">{m.mood}</span></td>
                          <td className="py-2.5 text-right text-pink">${m.price}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

              </div>
            )}

          </main>

          {/* FOOTER */}
          <footer className="bg-[#090D1A] border-t border-white/5 px-6 py-8 mt-12 text-sm text-gray-400">
            <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
              <div>
                <h4 className="text-gradient font-bold text-base mb-3">CineHub Customer Care</h4>
                <p className="text-xs mb-2">Need assistance with your ticket or reservation? Contact us anytime.</p>
                <div className="text-xs flex flex-col gap-1.5 text-white">
                  <div>📞 Support Line: +1-800-CINE-HUB</div>
                  <div>📞 Book by Phone: +1-800-BOOK-NOW</div>
                  <div>✉️ Email: support@cinehub.com</div>
                </div>
              </div>

              <div>
                <h4 className="font-bold text-base mb-3 text-white">Social Media handles</h4>
                <div className="flex gap-4">
                  <span className="p-2 bg-white/5 rounded-full text-white cursor-pointer hover:bg-purple"><i data-lucide="facebook" className="w-4 h-4"></i></span>
                  <span className="p-2 bg-white/5 rounded-full text-white cursor-pointer hover:bg-purple"><i data-lucide="instagram" className="w-4 h-4"></i></span>
                  <span className="p-2 bg-white/5 rounded-full text-white cursor-pointer hover:bg-purple"><i data-lucide="twitter" className="w-4 h-4"></i></span>
                  <span className="p-2 bg-white/5 rounded-full text-white cursor-pointer hover:bg-purple"><i data-lucide="youtube" className="w-4 h-4"></i></span>
                </div>
              </div>

              <div>
                <h4 className="font-bold text-base mb-3 text-white">Quick Help & FAQs</h4>
                <ul className="text-xs flex flex-col gap-2">
                  <li className="hover:text-pink cursor-pointer">How to reserve seats (Book Later)?</li>
                  <li className="hover:text-pink cursor-pointer">How does Group Booking Planner work?</li>
                  <li className="hover:text-pink cursor-pointer">Redeeming Reward points & tokens</li>
                </ul>
              </div>
            </div>

            <div className="max-w-7xl mx-auto border-t border-white/5 mt-8 pt-4 flex justify-between flex-wrap text-xs">
              <span>© 2026 CineHub Entertainment Ltd. All rights reserved.</span>
              <div className="flex gap-4">
                <span className="cursor-pointer hover:text-white">Privacy Policy</span>
                <span className="cursor-pointer hover:text-white">Terms of Service</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // Divider helper
    const DividerLine = () => <div className="border-t border-white/10 my-4"></div>;

    // Render app
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<CineHubApp />);

    // Initialize lucide icons after Babel compile renders DOM
    setTimeout(() => {
      lucide.createIcons();
    }, 1000);
  </script>
</body>
